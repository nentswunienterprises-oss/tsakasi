<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{DOCUMENT_TITLE}}</title>
    <style>
      :root {
        /* Brand controls live here so the letterhead can be tuned quickly. */
        --brand-black: #000000;
        --brand-cyan: #00aeef;
        --brand-orange: #ff8a00;
        --brand-text: #f5f8fb;
        --brand-muted: rgba(245, 248, 251, 0.72);
        --brand-panel: rgba(255, 255, 255, 0.06);
        --brand-panel-border: rgba(255, 255, 255, 0.12);
        --page-width: 210mm;
        --page-height: 297mm;
        --left-stripe-offset: 12mm;
        --left-stripe-width: 8mm;
        --content-left: 36mm;
        --content-right: 24mm;
        --content-top: 38mm;
        --content-bottom: 30mm;
      }

      @page {
        size: A4;
        margin: 0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: var(--page-width);
        background: var(--brand-black);
        color: var(--brand-text);
        font-family: Aptos, "Segoe UI", Arial, sans-serif;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        min-height: var(--page-height);
        position: relative;
        line-height: 1.6;
      }

      .page-shell {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .background-fill {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top center, rgba(0, 174, 239, 0.12), transparent 22%),
          linear-gradient(180deg, rgba(255, 138, 0, 0.03), transparent 30%),
          var(--brand-black);
      }

      .reference-layer {
        position: absolute;
        inset: 0;
        opacity: 0.26;
        background-position: center top;
        background-repeat: no-repeat;
        background-size: cover;
        {{REFERENCE_BACKGROUND_STYLE}}
      }

      .reference-disabled {
        display: none;
      }

      .left-stripe {
        position: absolute;
        top: 0;
        bottom: 0;
        left: var(--left-stripe-offset);
        width: var(--left-stripe-width);
        background: linear-gradient(180deg, #0cbcff 0%, var(--brand-cyan) 100%);
        box-shadow: 0 0 30px rgba(0, 174, 239, 0.2);
      }

      .orange-accent {
        position: absolute;
        left: var(--left-stripe-offset);
        bottom: 0;
        width: 38mm;
        height: 46mm;
        background: linear-gradient(180deg, #ff9d24 0%, var(--brand-orange) 100%);
        clip-path: polygon(0 100%, 0 74%, 58% 0, 100% 0, 34% 100%);
      }

      .logo {
        position: absolute;
        top: 12mm;
        left: 50%;
        transform: translateX(-50%);
        width: 34mm;
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.35));
      }

      .document {
        position: relative;
        margin: var(--content-top) var(--content-right) var(--content-bottom) var(--content-left);
        padding: 0 0 12mm;
      }

      .document-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8mm;
        align-items: end;
        margin-bottom: 12mm;
      }

      .eyebrow {
        font-size: 9.5pt;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--brand-cyan);
        margin-bottom: 3mm;
      }

      h1 {
        margin: 0;
        font-size: 22pt;
        line-height: 1.15;
        font-weight: 700;
        max-width: 118mm;
      }

      .meta {
        min-width: 54mm;
        padding: 5mm 5.5mm;
        border: 1px solid rgba(0, 174, 239, 0.3);
        background: linear-gradient(180deg, rgba(0, 174, 239, 0.11), rgba(255, 255, 255, 0.03));
        border-radius: 4mm;
      }

      .meta-row {
        margin: 0;
        font-size: 9.5pt;
        color: var(--brand-muted);
      }

      .meta-row strong {
        color: var(--brand-text);
        font-weight: 600;
      }

      .content-card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.04));
        border: 1px solid var(--brand-panel-border);
        border-radius: 6mm;
        padding: 10mm 9mm;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .content-card h2,
      .content-card h3,
      .content-card h4 {
        color: #ffffff;
        margin-top: 0;
        margin-bottom: 4mm;
        line-height: 1.3;
      }

      .content-card h2 {
        font-size: 16pt;
      }

      .content-card h3 {
        font-size: 12.5pt;
      }

      .content-card p,
      .content-card li,
      .content-card blockquote {
        font-size: 11pt;
        color: rgba(245, 248, 251, 0.92);
      }

      .content-card p {
        margin: 0 0 4.2mm;
      }

      .content-card ul,
      .content-card ol {
        margin: 0 0 4.2mm 6mm;
        padding: 0;
      }

      .content-card li + li {
        margin-top: 1.8mm;
      }

      .content-card strong {
        color: #ffffff;
      }

      .content-card a {
        color: #8edfff;
      }

      .content-card hr {
        border: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        margin: 6mm 0;
      }

      .content-card table {
        width: 100%;
        border-collapse: collapse;
        margin: 5mm 0;
        font-size: 10.5pt;
      }

      .content-card th,
      .content-card td {
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 3mm;
        text-align: left;
        vertical-align: top;
      }

      .content-card th {
        background: rgba(0, 174, 239, 0.12);
      }

      .footer {
        margin-top: 8mm;
        padding-top: 5mm;
        font-size: 9pt;
        color: var(--brand-muted);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="background-fill"></div>
      <div class="reference-layer {{REFERENCE_BACKGROUND_CLASS}}"></div>
      <div class="left-stripe"></div>
      <div class="orange-accent"></div>
      <img class="logo" src="{{LOGO_DATA_URI}}" alt="Tsa Kasi Logistics logo" />
    </div>

    <main class="document">
      <header class="document-header">
        <div>
          <div class="eyebrow">Tsa Kasi Logistics</div>
          <h1>{{DOCUMENT_TITLE}}</h1>
        </div>

        <div class="meta">
          <p class="meta-row"><strong>Date:</strong> {{DATE}}</p>
          <p class="meta-row"><strong>Client:</strong> {{CLIENT_NAME}}</p>
          <p class="meta-row"><strong>Reference:</strong> {{REFERENCE_NUMBER}}</p>
        </div>
      </header>

      <section class="content-card">
        {{BODY}}
      </section>

      <footer class="footer">{{FOOTER}}</footer>
    </main>
  </body>
</html>
